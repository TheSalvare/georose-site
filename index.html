  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #1a1520;
    color: #f5f0f8;
    font-family: 'Kefa', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1a1520; }
  ::-webkit-scrollbar-thumb { background: #9A82A9; border-radius: 2px; }

  .f-display { font-family: 'Fayte', serif; }
  .f-body { font-family: 'Kefa', sans-serif; }

  @keyframes drift {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: var(--p-opacity, 0.2); }
    90% { opacity: var(--p-opacity, 0.2); }
    100% { transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)); opacity: 0; }
  }
  @keyframes gentleBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Header */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 90;
    padding: 20px 28px;
    display: flex; justify-content: space-between; align-items: center;
    background: transparent;
    border-bottom: none;
  }
  #header .logo {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #header .logo svg { width: 18px; height: 18px; opacity: 0.4; }
  #header nav { display: flex; gap: 24px; }
  #header nav a {
    font-family: 'Kefa', sans-serif;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: rgba(245, 240, 248, 0.35);
    border-bottom: 2px solid transparent;
    padding-bottom: 2px; transition: all 0.3s;
  }
  #header nav a:hover, #header nav a.active {
    color: #f6aab4;
    border-bottom-color: #f6aab4;
  }

  /* Hero */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    padding: 40px 24px; text-align: center;
  }
  .hero-glow {
    position: absolute; top: 30%; left: 50%;
    width: 800px; height: 800px; border-radius: 50%;
    background: radial-gradient(circle, rgba(150, 131, 172, 0.08), transparent 70%);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  .hero-content {
    position: relative; max-width: 700px;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .hero-pretitle {
    font-family: 'Kefa', sans-serif;
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.5em; color: #f5f0f8;
    opacity: 0.5;
    margin-bottom: 40px;
  }
  .hero h1 {
    font-size: clamp(52px, 9vw, 88px);
    font-weight: 400; color: #f5f0f8;
    letter-spacing: 0.02em; line-height: 1.1;
  }
  .hero h1 .accent { color: #f6aab4; }
  .hero-dots {
    display: flex; gap: 6px; justify-content: center;
    margin: 32px 0;
    animation: fadeIn 1.5s ease 0.5s both;
  }
  .hero-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    display: inline-block;
  }
  .hero-tagline {
    font-family: 'Kefa', sans-serif;
    font-size: 13px; line-height: 2; color: #f5f0f8;
    max-width: 500px; margin: 0 auto 16px;
    animation: fadeIn 1.5s ease 0.4s both;
  }
  .hero-scroll-line {
    width: 1px; height: 40px; margin: 48px auto 0;
    background: linear-gradient(180deg, rgba(245, 240, 248, 0.1), transparent);
    animation: fadeIn 1.5s ease 1s both, gentleBob 3s ease-in-out infinite;
  }

  /* Particles */
  .particle-field {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
.particle {
  position: absolute;
  clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
  animation: drift var(--duration) linear var(--delay) infinite;
}

  /* Socials */
  .socials {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; align-items: center; z-index: 90;
    animation: fadeIn 1s ease 0.6s both;
  }
  .social-link {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; color: #F5F0F8;
    transition: all 0.3s ease; text-decoration: none;
  }
  .social-link svg { width: 22px; height: 22px; fill: currentColor; transition: all 0.3s ease; }
  .social-link:hover { color: #f6aab4; transform: translateY(-3px); }

  @media (max-width: 768px) {
    #header { padding: 16px 20px; }
    #header nav { gap: 14px; }
    #header nav a { font-size: 9px; letter-spacing: 0.08em; }
    .hero-tagline { font-size: 12px; max-width: 340px; }
    .socials { bottom: 24px; gap: 20px; }
    .social-link svg { width: 20px; height: 20px; }
  }
</style>
</head>

<!-- Particles Script -->
<script>
  document.querySelectorAll('.particle-field').forEach(function(field) {
    var colors = ['#f6aab4','#9A82A9','#c4bcc9','#f5f0f8','#231e28'];
    var count = 35;
    for (var i = 0; i < count; i++) {
      var dot = document.createElement('div');
      dot.className = 'particle';
      var size = 4 + Math.random() * 6;
      var color = colors[i % colors.length];
      var duration = 18 + Math.random() * 28;
      var delay = -(Math.random() * 22);
      var dx = -25 + Math.random() * -45;
      var dy = -35 + Math.random() * -55;
      dot.style.cssText =
        'left:' + (Math.random()*100) + '%;' +
        'top:' + (Math.random()*100) + '%;' +
        'width:' + size + 'px;' +
        'height:' + size + 'px;' +
        'background:' + color + ';' +
        '--p-opacity:' + (0.2 + Math.random()*0.25) + ';' +
        '--duration:' + duration + 's;' +
        '--delay:' + delay + 's;' +
        '--dx:' + dx + ';' +
        '--dy:' + dy + ';' +
        'animation-duration:' + duration + 's;' +
        'animation-delay:' + delay + 's;';
      field.appendChild(dot);
    }
  });
</script>
